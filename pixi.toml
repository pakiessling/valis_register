[workspace]
authors = ["pakiessling <pakiessling@ukaachen.de>"]
channels = ["conda-forge"]
name = "valis_align"
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[tasks]

[dependencies]
openjdk = ">=25.0.2,<26"
python = ">=3.11,<3.12"
ipykernel = ">=7.3.0,<8"
maven = ">=3.9.16,<4"

[pypi-dependencies]
# Our fork of MathOnco/valis 1.2.0 with GPU/MPS device fixes, the CUDA
# tensor->numpy .cpu() fixes, the rigid-only cleanup() fix, and a
# colour-science<0.4.5 pin (which is why the explicit pin below is gone).
valis-wsi = { git = "https://github.com/pakiessling/valis.git", rev = "030b4a9f5f666c0d6bd8d89df792ab7145be1b64" }
